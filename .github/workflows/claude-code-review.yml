name: Claude Code Review (BMAD Adversarial)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # BMAD's skills live in .claude/skills/ but are gitignored (installed
      # per-machine), so the runner has no copy. Install them fresh here.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # `bmad-review-adversarial-general` belongs to the `core` module, which is
      # auto-added; `bmm` is a small superset and matches the local install.
      # `@next` tracks the local prerelease channel — swap to a pinned version
      # (e.g. bmad-method@6.8.1-next.0) if you want byte-reproducible CI runs.
      - name: Install BMAD (headless)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx --yes bmad-method@next install --yes --modules bmm --tools claude-code

      - name: Run BMAD adversarial review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Start the prompt with the slash command so the skill is invoked
          # deterministically, not left to the model to decide.
          prompt: |
            /bmad-review-adversarial-general

            Content to review: this pull request's diff. If it is not already in
            context, load it with `gh pr diff ${{ github.event.pull_request.number }}`.
            Post the skill's findings as a single PR review.
          claude_args: '--allowed-tools "Bash(gh pr diff:*),Read,Grep,Glob"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
